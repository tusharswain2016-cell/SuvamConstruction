<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>suvamconstructions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    background:
    linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.72)),
    url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
    position:relative;
}

body::before{
    content:'';
    position:absolute;
    width:420px;
    height:420px;
    background:#e30613;
    border-radius:50%;
    filter:blur(180px);
    opacity:.22;
    top:5%;
    left:8%;
    animation:float1 8s infinite alternate ease-in-out;
}

body::after{
    content:'';
    position:absolute;
    width:320px;
    height:320px;
    background:#ffffff;
    border-radius:50%;
    filter:blur(170px);
    opacity:.08;
    bottom:5%;
    right:8%;
    animation:float2 10s infinite alternate ease-in-out;
}

.wrapper{
    max-width:950px;
    padding:40px 20px;
    color:#fff;
    position:relative;
    z-index:2;
}

.logo{
    font-size:44px;
    font-weight:900;
    letter-spacing:6px;
    margin-bottom:18px;
}

.line{
    width:95px;
    height:4px;
    background:#e30613;
    margin:0 auto 30px;
    border-radius:20px;
}

h1{
    font-size:82px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:4px;
    margin-bottom:18px;
}

p{
    font-size:22px;
    color:#ededed;
    line-height:1.9;
    max-width:760px;
    margin:auto;
}

.timer{
    margin-top:45px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.box{
    width:110px;
    padding:22px 10px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    backdrop-filter:blur(8px);
}

.box span{
    display:block;
    font-size:42px;
    font-weight:900;
}

.box small{
    font-size:13px;
    letter-spacing:2px;
    color:#ddd;
    text-transform:uppercase;
}

.small{
    margin-top:35px;
    font-size:14px;
    letter-spacing:4px;
    color:#d4d4d4;
    text-transform:uppercase;
}

@keyframes float1{
    from{transform:translate(0,0);}
    to{transform:translate(120px,70px);}
}

@keyframes float2{
    from{transform:translate(0,0);}
    to{transform:translate(-90px,-60px);}
}

@media(max-width:768px){

.logo{
    font-size:30px;
    letter-spacing:3px;
}

h1{
    font-size:48px;
}

p{
    font-size:16px;
}

.box{
    width:85px;
    padding:16px 8px;
}

.box span{
    font-size:30px;
}

.small{
    font-size:11px;
    letter-spacing:2px;
}
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="logo">SUVAM CONSTRUCTION</div>
    <div class="line"></div>

    <h1>Coming Soon</h1>

    <p>
        Where Dreams Take Shape and Trust is Built.  
        Our premium website is launching soon.
    </p>

    <div class="timer">
        <div class="box">
            <span id="days">05</span>
            <small>Days</small>
        </div>

        <div class="box">
            <span id="hours">00</span>
            <small>Hours</small>
        </div>

        <div class="box">
            <span id="minutes">00</span>
            <small>Minutes</small>
        </div>

        <div class="box">
            <span id="seconds">00</span>
            <small>Seconds</small>
        </div>
    </div>

    <div class="small">Building The Future of Odisha</div>
</div>

<script>
let countdown = 5 * 24 * 60 * 60;

setInterval(function(){

let days = Math.floor(countdown / 86400);
let hours = Math.floor((countdown % 86400) / 3600);
let minutes = Math.floor((countdown % 3600) / 60);
let seconds = countdown % 60;

document.getElementById("days").innerHTML = String(days).padStart(2,'0');
document.getElementById("hours").innerHTML = String(hours).padStart(2,'0');
document.getElementById("minutes").innerHTML = String(minutes).padStart(2,'0');
document.getElementById("seconds").innerHTML = String(seconds).padStart(2,'0');

if(countdown > 0){
countdown--;
}

},1000);
</script>

</body>
</html>
