<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suvam Construction - Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    background:
    linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.72)),
    url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
    position:relative;
}

/* Glow Effects */
body::before{
    content:'';
    position:absolute;
    width:420px;
    height:420px;
    background:#e30613;
    border-radius:50%;
    filter:blur(180px);
    opacity:.22;
    top:5%;
    left:8%;
    animation:float1 8s infinite alternate ease-in-out;
}

body::after{
    content:'';
    position:absolute;
    width:320px;
    height:320px;
    background:#ffffff;
    border-radius:50%;
    filter:blur(170px);
    opacity:.08;
    bottom:5%;
    right:8%;
    animation:float2 10s infinite alternate ease-in-out;
}

.wrapper{
    max-width:900px;
    padding:40px 20px;
    color:#fff;
    position:relative;
    z-index:2;
    animation:fadeUp 1.4s ease;
}

.logo{
    font-size:58px;
    font-weight:900;
    letter-spacing:8px;
    margin-bottom:18px;
}

.line{
    width:95px;
    height:4px;
    background:#e30613;
    margin:0 auto 30px;
    border-radius:20px;
}

h1{
    font-size:86px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:4px;
    margin-bottom:18px;
}

p{
    font-size:22px;
    color:#ededed;
    line-height:1.9;
    max-width:760px;
    margin:auto;
}

.small{
    margin-top:35px;
    font-size:14px;
    letter-spacing:4px;
    color:#d4d4d4;
    text-transform:uppercase;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float1{
    from{transform:translate(0,0);}
    to{transform:translate(120px,70px);}
}

@keyframes float2{
    from{transform:translate(0,0);}
    to{transform:translate(-90px,-60px);}
}

@media(max-width:768px){

.logo{
    font-size:38px;
    letter-spacing:5px;
}

h1{
    font-size:52px;
}

p{
    font-size:16px;
}

.small{
    font-size:12px;
    letter-spacing:2px;
}
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="logo">SUVAM</div>
    <div class="line"></div>

    <h1>Coming Soon</h1>

    <p>
        Where Dreams Take Shape and Trust is Built.  
        Our premium website is under construction and will be launching soon.
    </p>

    <div class="small">Building The Future of Odisha</div>
</div>

</body>
</html>
